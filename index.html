<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
<meta name="theme-color" content="#E8551A" />
<title>แบบทดสอบสื่ออินโฟกราฟิก | คณะศิลปศาสตร์ มธ.</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<style>
/* ============================================================
   L'Arts Day 2569 — แบบทดสอบสื่ออินโฟกราฟิก (A/B Test)
   Single-file, responsive, works on any device/platform.
   ============================================================ */
:root{
  --brand:#E8551A; --brand-dark:#C7430F; --brand-soft:#FFF3EC;
  --ink:#23262F; --muted:#6B7280; --line:#E7E3DE; --bg:#FBF7F3;
  --ok:#1E9E5A; --okbg:#E9F7EF; --err:#D64545; --errbg:#FCEBEB;
  --card:#FFFFFF; --radius:16px; --shadow:0 6px 24px rgba(40,20,10,.08);
  --maxw:720px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:'Sarabun','Noto Sans Thai',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg); color:var(--ink); line-height:1.6;
  font-size:17px; -webkit-text-size-adjust:100%;
}
.wrap{max-width:var(--maxw); margin:0 auto; padding:0 16px 64px}

/* Header / progress */
.topbar{position:sticky; top:0; z-index:50; background:rgba(251,247,243,.92);
  backdrop-filter:saturate(180%) blur(8px); border-bottom:1px solid var(--line)}
.topbar .inner{max-width:var(--maxw); margin:0 auto; padding:10px 16px}
.brandrow{display:flex; align-items:center; gap:10px; justify-content:space-between}
.brandname{font-weight:700; font-size:15px; color:var(--brand-dark); letter-spacing:.2px}
.groupchip{font-size:12px; font-weight:700; padding:3px 10px; border-radius:999px;
  background:var(--brand-soft); color:var(--brand-dark); border:1px solid #F4C9B4}
.steps{display:flex; gap:6px; margin-top:10px}
.steps .seg{flex:1; height:6px; border-radius:99px; background:#EDE6DF; overflow:hidden}
.steps .seg.done{background:var(--brand)}
.steps .seg.active{background:linear-gradient(90deg,var(--brand) 50%,#EDE6DF 50%)}
.steplabel{margin-top:6px; font-size:12.5px; color:var(--muted); text-align:center}

/* Cards / layout */
.screen{padding-top:22px; animation:fade .25s ease}
@keyframes fade{from{opacity:0; transform:translateY(6px)} to{opacity:1; transform:none}}
.card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
  box-shadow:var(--shadow); padding:22px; margin-bottom:16px}
h1{font-size:24px; line-height:1.35; margin:.1em 0 .35em; font-weight:700}
h2{font-size:19px; margin:0 0 .4em; font-weight:700; color:var(--brand-dark)}
h3{font-size:16px; margin:1.1em 0 .3em; font-weight:700}
p{margin:.5em 0}
.lead{color:var(--muted); font-size:15.5px}
.small{font-size:13.5px; color:var(--muted)}
.kvs{display:grid; grid-template-columns:auto 1fr; gap:6px 14px; font-size:14.5px; margin:.5em 0}
.kvs b{color:var(--brand-dark); white-space:nowrap}
.divider{height:1px; background:var(--line); margin:18px 0}
.notice{background:var(--brand-soft); border:1px solid #F4C9B4; border-radius:12px; padding:12px 14px; font-size:14.5px}
ul.clean{padding-left:20px; margin:.4em 0} ul.clean li{margin:.25em 0}

/* Consent checkboxes */
.consent-item{display:flex; gap:12px; align-items:flex-start; padding:12px;
  border:1px solid var(--line); border-radius:12px; margin:8px 0; cursor:pointer; transition:.15s; background:#fff}
.consent-item:hover{border-color:#F4C9B4}
.consent-item.checked{border-color:var(--brand); background:var(--brand-soft)}
.consent-item input{width:22px; height:22px; margin-top:2px; accent-color:var(--brand); flex:none}
.consent-item span{font-size:15px}
.consent-item.master{border:2px solid var(--brand); background:#FFF7F2; margin-top:12px}
.consent-item.master .mhint{display:block; margin-top:5px; font-size:13px; font-weight:700; color:var(--brand-dark)}
.consent-sub-note{font-size:13px; color:var(--muted); margin:2px 0 8px}
.consent-read{display:flex; gap:10px; align-items:flex-start; padding:7px 4px; font-size:14.5px; color:var(--ink)}
.consent-read .ck{flex:none; width:22px; height:22px; border-radius:6px; background:var(--okbg); color:var(--ok);
  display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; margin-top:1px}

/* Question blocks */
.q{margin-bottom:18px}
.q-title{font-weight:600; font-size:16.5px; margin-bottom:4px}
.q-help{font-size:13px; color:var(--muted); margin-bottom:10px}
.req{color:var(--err); font-weight:700}
.opt{display:flex; gap:12px; align-items:center; padding:13px 14px; border:1.5px solid var(--line);
  border-radius:12px; margin:8px 0; cursor:pointer; transition:.12s; background:#fff; user-select:none}
.opt:hover{border-color:#F4C9B4; background:#FFFaf6}
.opt.sel{border-color:var(--brand); background:var(--brand-soft); box-shadow:0 0 0 3px rgba(232,85,26,.12)}
.opt input{width:20px; height:20px; accent-color:var(--brand); flex:none}
.opt .otxt{font-size:15.5px}
.opt .badge{flex:none; width:28px; height:28px; border-radius:8px; background:#F1ECE6; color:var(--brand-dark);
  font-weight:700; display:flex; align-items:center; justify-content:center; font-size:14px}
.opt.sel .badge{background:var(--brand); color:#fff}
.other-input{margin:6px 0 0 40px; width:calc(100% - 40px); padding:10px 12px; border:1px solid var(--line);
  border-radius:10px; font:inherit}

/* Likert */
.likert-legend{display:flex; justify-content:space-between; font-size:11.5px; color:var(--muted); margin:2px 2px 10px}
.likert{display:grid; grid-template-columns:repeat(5,1fr); gap:6px; margin-top:8px}
.likert label{display:flex; flex-direction:column; align-items:center; gap:4px; padding:10px 4px;
  border:1.5px solid var(--line); border-radius:12px; cursor:pointer; transition:.12s; background:#fff; text-align:center}
.likert label:hover{border-color:#F4C9B4}
.likert label.sel{border-color:var(--brand); background:var(--brand-soft); box-shadow:0 0 0 3px rgba(232,85,26,.12)}
.likert input{position:absolute; opacity:0; width:0; height:0}
.likert .num{font-weight:700; font-size:18px; color:var(--brand-dark)}
.likert .lab{font-size:11px; color:var(--muted); line-height:1.25}
.dimhead{font-weight:700; color:#fff; background:var(--brand); padding:8px 14px; border-radius:10px; margin:18px 0 6px; font-size:15px}

/* Media / countdown */
.media-stage{text-align:center}
/* การ์ดสื่อกว้างกว่าปกติบนจอใหญ่ เพื่อให้รูปใหญ่และอ่านง่าย */
.card.media-card{width:min(96vw,960px); margin-left:50%; transform:translateX(-50%); padding:18px}
.timer{position:relative; width:88px; height:88px; margin:4px auto 12px}
.timer svg{transform:rotate(-90deg)}
.timer .num{position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  font-size:32px; font-weight:700; color:var(--brand-dark)}
.media-frame{position:relative; width:100%; max-width:840px; margin:0 auto}
.media-img{width:100%; display:block; border-radius:14px; border:1px solid var(--line);
  box-shadow:var(--shadow); cursor:zoom-in}
.nodrag{ -webkit-user-drag:none; user-select:none }
.zoom-hint{display:inline-flex; gap:6px; align-items:center; margin-top:12px; font-size:14.5px; font-weight:600;
  color:var(--brand-dark); background:var(--brand-soft); border:1px solid #F4C9B4; padding:8px 16px;
  border-radius:999px; cursor:zoom-in}
.lockhint{font-size:13px; color:var(--muted); margin-top:10px}

/* Lightbox ขยายรูปเต็มจอ */
.lightbox{position:fixed; inset:0; z-index:200; background:rgba(18,10,6,.94); display:none; overflow:auto;
  -webkit-overflow-scrolling:touch; cursor:zoom-out}
.lightbox.open{display:block}
.lightbox .lb-inner{min-height:100%; padding:58px 10px 28px; box-sizing:border-box}
.lightbox img{display:block; width:100%; max-width:1100px; margin:0 auto; border-radius:10px; cursor:default}
.lb-close{position:fixed; top:12px; right:14px; z-index:210; width:46px; height:46px; border-radius:50%;
  background:#fff; color:#23262F; border:none; font-size:20px; font-weight:700; cursor:pointer;
  box-shadow:0 4px 14px rgba(0,0,0,.35); display:flex; align-items:center; justify-content:center}
.lb-cd{position:fixed; top:14px; left:14px; z-index:210; background:rgba(232,85,26,.96); color:#fff;
  font-weight:700; padding:9px 15px; border-radius:999px; font-size:14.5px}

/* Buttons */
.btn{display:inline-flex; align-items:center; justify-content:center; gap:8px; width:100%;
  padding:15px 20px; font:inherit; font-weight:700; font-size:17px; border:none; border-radius:14px;
  background:var(--brand); color:#fff; cursor:pointer; transition:.15s; box-shadow:0 4px 14px rgba(232,85,26,.28)}
.btn:hover{background:var(--brand-dark)}
.btn:disabled{background:#D8D2CB; color:#fff; cursor:not-allowed; box-shadow:none}
.btn.ghost{background:#fff; color:var(--brand-dark); border:1.5px solid var(--line); box-shadow:none}
.btn.ghost:hover{border-color:var(--brand); background:var(--brand-soft)}
.btnrow{display:flex; gap:10px; margin-top:14px}
.actions{position:sticky; bottom:0; padding:14px 0 4px; background:linear-gradient(180deg,rgba(251,247,243,0),var(--bg) 30%)}
.err-msg{color:var(--err); background:var(--errbg); border:1px solid #F3C9C9; padding:10px 12px;
  border-radius:10px; font-size:14px; margin-top:10px; display:none}
.err-msg.show{display:block}

/* Loader / done */
.center{text-align:center; padding:30px 6px}
.spinner{width:46px; height:46px; border:5px solid #EFE7E0; border-top-color:var(--brand);
  border-radius:50%; animation:spin .9s linear infinite; margin:10px auto 18px}
@keyframes spin{to{transform:rotate(360deg)}}
.check{width:78px; height:78px; border-radius:50%; background:var(--okbg); color:var(--ok);
  display:flex; align-items:center; justify-content:center; font-size:42px; margin:0 auto 16px}
.fallback{margin-top:16px; text-align:left}
textarea.dump{width:100%; height:150px; font:13px/1.5 monospace; padding:10px; border:1px solid var(--line); border-radius:10px}

@media (max-width:420px){
  body{font-size:16px}
  .likert .lab{font-size:10px}
  h1{font-size:21px}
  .card{padding:18px}
  .card.media-card{padding:12px; width:97vw}
}
</style>
</head>

// --- 3.1 ส่วนที่ 1: คำถามทั่วไป ---
function screenPart1(){
  setStep(1);
  const blocks = PART1.map((q,qi)=>{
    const opts = q.options.map(o=>{
      const inputType = q.type==='radio'?'radio':'checkbox';
      const other = o.other ? `<input class="other-input" id="other_${q.id}" type="text" placeholder="โปรดระบุ..." />` : '';
      return `
        <label class="opt" data-q="${q.id}" data-v="${o.v}">
          <input type="${inputType}" name="${q.id}" value="${o.v}" />
          <span class="otxt">${esc(o.t)}</span>
        </label>${other}`;
    }).join('');
    return `
      <div class="q" data-qid="${q.id}">
        <div class="q-title">ข้อที่ ${qi+1} ${esc(q.title)} ${q.required?'<span class="req">*</span>':''}</div>
        <div class="q-help">${esc(q.help)}</div>
        ${opts}
      </div>`;
  }).join('<div class="divider"></div>');

  go(`
  <div class="screen">
    <div class="card">
      <h2>ส่วนที่ 1 · ข้อมูลทั่วไป</h2>
      <p class="small">โปรดเลือกคำตอบที่ตรงกับท่านมากที่สุด ข้อมูลนี้ใช้เพื่อการวิเคราะห์ในภาพรวมเท่านั้น</p>
      <div class="divider"></div>
      ${blocks}
      <div class="err-msg" id="p1err">กรุณาตอบคำถามที่มีเครื่องหมาย * ให้ครบทุกข้อ</div>
    </div>
    <div class="actions"><button class="btn" id="btnP1">ถัดไป → รับชมสื่อ</button></div>
  </div>`);

  // interaction — .opt เป็น <label> การคลิกจะ check/uncheck input ให้เองโดยอัตโนมัติ
  app.querySelectorAll('.opt input').forEach(inp=>{
    inp.addEventListener('change',()=>syncSel(inp.closest('.opt')));
  });
  function syncSel(el){
    const qid = el.dataset.q;
    if(el.querySelector('input').type==='radio'){
      app.querySelectorAll(`.opt[data-q="${qid}"]`).forEach(o=>o.classList.toggle('sel', o.querySelector('input').checked));
    } else {
      el.classList.toggle('sel', el.querySelector('input').checked);
    }
  }
  document.getElementById('btnP1').addEventListener('click',()=>{
    const data = {};
    for(const q of PART1){
      if(q.type==='radio'){
        const c = app.querySelector(`input[name="${q.id}"]:checked`);
        data[q.id] = c ? c.value : '';
      } else {
        const checked = [...app.querySelectorAll(`input[name="${q.id}"]:checked`)].map(c=>c.value);
        data[q.id] = checked;
        if(checked.includes('other')){ data[q.id+'_other_text'] = (document.getElementById('other_'+q.id)?.value||'').trim(); }
      }
    }
    const missing = PART1.some(q=> q.required && (!data[q.id] || data[q.id].length===0));
    if(missing){ const e=document.getElementById('p1err'); e.classList.add('show'); e.scrollIntoView({behavior:'smooth',block:'center'}); return; }
    state.part1 = data;
    screenMedia();
  });
}

function screenMedia(){
  setStep(2);
  const img = GROUP==='A' ? CONFIG.IMAGE_A : CONFIG.IMAGE_B;
  const total = CONFIG.VIEW_SECONDS;
  go(`
  <div class="screen">
    <div class="card media-stage media-card">
      <h2>รับชมสื่ออินโฟกราฟิก</h2>
      <p class="small">โปรดตั้งใจดูสื่อให้ละเอียด ระบบจะเริ่มแบบทดสอบโดยอัตโนมัติเมื่อหมดเวลา และท่าน<strong>ไม่สามารถย้อนกลับมาดูสื่อได้อีก</strong></p>
      <div class="timer">
        <svg width="88" height="88"><circle cx="44" cy="44" r="38" stroke="#EFE7E0" stroke-width="8" fill="none"/>
          <circle id="ring" cx="44" cy="44" r="38" stroke="#E8551A" stroke-width="8" fill="none"
            stroke-linecap="round" stroke-dasharray="${(2*Math.PI*38).toFixed(1)}" stroke-dashoffset="0"/></svg>
        <div class="num" id="cd">${total}</div>
      </div>
      <div class="media-frame">
        <img class="media-img nodrag" id="mediaImg" src="${img}" alt="สื่ออินโฟกราฟิก กลุ่ม ${GROUP}"
          oncontextmenu="return false"
          onerror="this.style.display='none';document.getElementById('imgErr').style.display='block';document.getElementById('zoomHint').style.display='none'"/>
        <div id="imgErr" style="display:none" class="notice">ไม่พบไฟล์รูปสื่อ — โปรดวางไฟล์ <code>${esc(img)}</code> (ดูคู่มือ README)</div>
      </div>
      <div><span class="zoom-hint" id="zoomHint">🔍 แตะที่ภาพเพื่อขยายดูชัด ๆ เต็มจอ</span></div>
      <div class="lockhint">⏱ ไม่สามารถกดข้ามได้ · เหลือเวลา <span id="cd2">${total}</span> วินาที</div>
    </div>
  </div>
  <div class="lightbox" id="lightbox" role="dialog" aria-label="ขยายรูปสื่อ">
    <button class="lb-close" id="lbClose" aria-label="ปิดการขยาย">✕</button>
    <div class="lb-cd">⏱ เหลือ <span id="cdLb">${total}</span> วิ</div>
    <div class="lb-inner"><img src="${img}" alt="สื่ออินโฟกราฟิก กลุ่ม ${GROUP}" oncontextmenu="return false"/></div>
  </div>`);

  // ----- ขยายรูป (lightbox) -----
  const lb = document.getElementById('lightbox');
  const openLb = ()=>{ if(document.getElementById('mediaImg').style.display!=='none') lb.classList.add('open'); };
  const closeLb = ()=>lb.classList.remove('open');
  document.getElementById('mediaImg').addEventListener('click', openLb);
  document.getElementById('zoomHint').addEventListener('click', openLb);
  document.getElementById('lbClose').addEventListener('click', e=>{ e.stopPropagation(); closeLb(); });
  lb.addEventListener('click', e=>{ if(e.target.tagName!=='IMG') closeLb(); }); // คลิกพื้นที่มืดเพื่อปิด
  const onEsc = e=>{ if(e.key==='Escape') closeLb(); };
  document.addEventListener('keydown', onEsc);

  // ----- นาฬิกานับถอยหลัง -----
  const ring = document.getElementById('ring');
  const circ = 2*Math.PI*38;
  const t0 = performance.now();
  armUnloadGuard();
  const timer = setInterval(()=>{
    const elapsed = (performance.now()-t0)/1000;
    const remain = Math.max(0, total - elapsed);
    const shown = Math.ceil(remain);
    document.getElementById('cd').textContent = shown;
    document.getElementById('cd2').textContent = shown;
    const lbcd = document.getElementById('cdLb'); if(lbcd) lbcd.textContent = shown;
    ring.style.strokeDashoffset = (circ * (elapsed/total)).toFixed(1);
    if(remain<=0){
      clearInterval(timer);
      document.removeEventListener('keydown', onEsc);
      closeLb();
      state.media_view_sec = +(performance.now()-t0)/1000;
      state.media_view_sec = +state.media_view_sec.toFixed(2);
      screenQuizIntro();
    }
  }, 100);
}

      <span class="badge">${L}</span>
      <input type="radio" name="quiz" value="${L}" style="display:none"/>
      <span class="otxt">${esc(item.options[L])}</span>
    </label>`).join('');
  go(`
  <div class="screen">
    <div class="card">
      <div class="small" style="color:var(--brand-dark);font-weight:700">ข้อ ${i+1} จาก ${QUIZ.length}</div>

    </div>
    <div class="actions">
      <button class="btn" id="btnQ">${i < QUIZ.length-1 ? 'ยืนยันคำตอบ → ข้อถัดไป' : 'ยืนยันคำตอบ → ทำส่วนที่ 3'}</button>
    </div>
  </div>`);
  state.quizStartedAt = performance.now();
  app.querySelectorAll('.opt').forEach(el=>{
    el.addEventListener('click',()=>{
      app.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
      el.classList.add('sel'); el.querySelector('input').checked=true;
    });
  });
  document.getElementById('btnQ').addEventListener('click',()=>{
    const c = app.querySelector('input[name="quiz"]:checked');
    if(!c){ const e=document.getElementById('qerr'); e.classList.add('show'); return; }
    const t = +((performance.now()-state.quizStartedAt)/1000).toFixed(2);
    const ans = c.value;
    state.quiz['q'+item.n] = { ans, code:letters.indexOf(ans)+1, correct: ans===item.correct?1:0, time_sec:t };
    if(i < QUIZ.length-1){ state.quizIndex++; renderQuiz(); }
    else { screenSatisfaction(); }
  });
}

// --- 3.4 ส่วนที่ 3: ความพึงพอใจ 12 ข้อ ---
function screenSatisfaction(){
  setStep(4);
  const dims = SAT_DIMS.map(d=>{
    const items = d.items.map(it=>`
      <div class="q">
        <div class="q-title">${it.n}. ${esc(it.t)}</div>
        <div class="likert" data-item="${it.n}">
          ${LIKERT.map(L=>`
            <label data-v="${L.v}">
              <input type="radio" name="s${it.n}" value="${L.v}"/>
              <span class="num">${L.v}</span><span class="lab">${L.l}</span>
            </label>`).join('')}
        </div>
      </div>`).join('');
    return `<div class="dimhead">${esc(d.name)}</div>${items}`;
  }).join('');
  go(`
  <div class="screen">
    <div class="card">
      <h2>ส่วนที่ 3 · ความพึงพอใจต่อสื่ออินโฟกราฟิก</h2>
      <p class="small">โปรดเลือกระดับที่ตรงกับความคิดเห็นของท่านต่อสื่อที่เพิ่งรับชม</p>
      <div class="likert-legend"><span>1 = น้อยที่สุด</span><span>5 = มากที่สุด</span></div>
      ${dims}
      <div class="err-msg" id="serr">กรุณาตอบให้ครบทั้ง 12 ข้อ (ข้อที่ยังไม่ได้ตอบจะถูกไฮไลต์)</div>
    </div>
    <div class="actions"><button class="btn" id="btnSat">ส่งแบบทดสอบ ✓</button></div>
  </div>`);
  app.querySelectorAll('.likert label').forEach(el=>{
    el.addEventListener('click',()=>{
      const grp = el.closest('.likert');
      grp.querySelectorAll('label').forEach(o=>o.classList.remove('sel'));
      el.classList.add('sel'); el.querySelector('input').checked=true;
      grp.style.outline='none';
    });
  });
  document.getElementById('btnSat').addEventListener('click',()=>{
    const sat={}; let missing=null;
    for(let n=1;n<=12;n++){
      const c=app.querySelector(`input[name="s${n}"]:checked`);
      if(!c){ if(!missing){ missing=app.querySelector(`.likert[data-item="${n}"]`); }
        app.querySelector(`.likert[data-item="${n}"]`).style.outline='2px solid var(--err)';
        app.querySelector(`.likert[data-item="${n}"]`).style.outlineOffset='3px';
        continue; }
      sat['s'+n]=+c.value;
    }
    if(missing){ document.getElementById('serr').classList.add('show'); missing.scrollIntoView({behavior:'smooth',block:'center'}); return; }
    state.sat=sat;
    submitAll();
  });
}

/* ============================================================
   4) รวมข้อมูล + ส่งเข้า Google Sheet
   ============================================================ */
function buildRecord(){
  const p1 = state.part1;
  const ch = Array.isArray(p1.channel)?p1.channel:[];
  const q = state.quiz;
  const sat = state.sat;
  const mean = arr => +(arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(3);
  const d1=mean([sat.s1,sat.s2,sat.s3]), d2=mean([sat.s4,sat.s5,sat.s6]),
        d3=mean([sat.s7,sat.s8,sat.s9]), d4=mean([sat.s10,sat.s11,sat.s12]);
  const score = [1,2,3,4,5].reduce((a,n)=>a+(q['q'+n]?.correct||0),0);
  const quizTime = +[1,2,3,4,5].reduce((a,n)=>a+(q['q'+n]?.time_sec||0),0).toFixed(2);
  const now = new Date();
  const rec = {
    respondent_id: state.respondent_id,
    group: GROUP, group_code: GROUP==='A'?1:2,
    consent: state.consent||1,
    start_time: state.start_time,
    submit_time: now.toISOString(),
    total_duration_sec: +((now - new Date(state.start_time))/1000).toFixed(1),
    // ส่วนที่ 1
    sex: p1.sex||'', age: p1.age||'', user_type: p1.user_type||'', freq: p1.freq||'',
    ch_fb: ch.includes('fb')?1:0, ch_ig: ch.includes('ig')?1:0, ch_web: ch.includes('web')?1:0,
    ch_phys: ch.includes('phys')?1:0, ch_fwd: ch.includes('fwd')?1:0, ch_other: ch.includes('other')?1:0,
    ch_other_text: p1.channel_other_text||'',
    // สื่อ
    media_view_sec: state.media_view_sec,
  };
  // ส่วนที่ 2 (quiz)
  for(let n=1;n<=5;n++){
    const x=q['q'+n]||{};
    rec['q'+n+'_ans']=x.ans||''; rec['q'+n+'_code']=x.code||'';
    rec['q'+n+'_correct']=(x.correct??''); rec['q'+n+'_time_sec']=(x.time_sec??'');
  }
  rec.quiz_score = score; rec.quiz_total_time_sec = quizTime;
  // ส่วนที่ 3 (satisfaction)
  for(let n=1;n<=12;n++) rec['s'+n]=sat['s'+n];
  rec.sat_dim1_mean=d1; rec.sat_dim2_mean=d2; rec.sat_dim3_mean=d3; rec.sat_dim4_mean=d4;
  rec.sat_overall_mean=mean([sat.s1,sat.s2,sat.s3,sat.s4,sat.s5,sat.s6,sat.s7,sat.s8,sat.s9,sat.s10,sat.s11,sat.s12]);
  // meta
  rec.platform = navigator.platform||'';
  rec.user_agent = navigator.userAgent||'';
  rec.screen = (screen.width+'x'+screen.height);
  rec.lang = navigator.language||'';
  return rec;
}

async function submitAll(){
  setStep(5);
  disarmUnloadGuard();
  const rec = buildRecord();
  go(`<div class="screen"><div class="card center">
      <div class="spinner"></div><h2>กำลังบันทึกคำตอบ...</h2>
      <p class="small">กรุณาอย่าปิดหน้านี้</p></div></div>`);

  let ok = false;
  if(CONFIG.ENDPOINT && !CONFIG.ENDPOINT.startsWith('PASTE_')){
    try{
      // simple request (text/plain) → ไม่มี CORS preflight กับ Apps Script
      const res = await fetch(CONFIG.ENDPOINT, {
        method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'},
        body: JSON.stringify(rec)
      });
      ok = res.ok;
      try{ const j = await res.json(); ok = (j && j.status==='ok') || ok; }catch(_){}
    }catch(err){
      // เผื่อ CORS อ่าน response ไม่ได้ → ส่งซ้ำแบบ no-cors (ข้อมูลยังถูกบันทึกที่เซิร์ฟเวอร์)
      try{
        await fetch(CONFIG.ENDPOINT,{method:'POST',mode:'no-cors',
          headers:{'Content-Type':'text/plain;charset=utf-8'}, body:JSON.stringify(rec)});
        ok = true;
      }catch(e2){ ok=false; }
    }
  }
  ok ? screenDone() : screenError(rec);
}

function screenDone(){
  go(`<div class="screen"><div class="card center">
      <div class="check">✓</div>
      <h1>ขอบคุณสำหรับการเข้าร่วม</h1>
      <p class="lead">ระบบได้บันทึกคำตอบของท่านเรียบร้อยแล้ว<br/>ความร่วมมือของท่านมีคุณค่าอย่างยิ่งต่องานวิจัยนี้</p>
      <div class="notice" style="margin-top:18px">งานสื่อสารองค์กรและประชาสัมพันธ์ · คณะศิลปศาสตร์ มหาวิทยาลัยธรรมศาสตร์</div>
    </div></div>`);
}

function screenError(rec){
  go(`<div class="screen"><div class="card">
      <div class="check" style="background:var(--errbg);color:var(--err)">!</div>
      <h2 style="text-align:center">ส่งข้อมูลไม่สำเร็จ</h2>
      <p class="small" style="text-align:center">โปรดตรวจสอบการเชื่อมต่ออินเทอร์เน็ตแล้วลองอีกครั้ง</p>
      <div class="btnrow"><button class="btn" id="btnRetry">ลองส่งอีกครั้ง</button></div>
      <div class="fallback">
        <p class="small">หากยังไม่สำเร็จ กรุณา “คัดลอกข้อมูล” ด้านล่างส่งให้ผู้วิจัยทางอีเมล Thitiwut.b@arts.tu.ac.th</p>
        <textarea class="dump" id="dump" readonly>${esc(JSON.stringify(rec))}</textarea>
        <div class="btnrow"><button class="btn ghost" id="btnCopy">คัดลอกข้อมูล</button></div>
      </div>
    </div></div>`);
  document.getElementById('btnRetry').addEventListener('click',()=>{ state.sat=state.sat; submitAll(); });
  document.getElementById('btnCopy').addEventListener('click',async()=>{
    const ta=document.getElementById('dump'); ta.select();
    try{ await navigator.clipboard.writeText(ta.value);}catch(_){ document.execCommand('copy'); }
    document.getElementById('btnCopy').textContent='คัดลอกแล้ว ✓';
  });
}

/* ============================================================
   5) ป้องกันปิด/รีเฟรชหน้ากลางคัน
   ============================================================ */
let guarded=false;
function beforeUnload(e){ e.preventDefault(); e.returnValue=''; }
function armUnloadGuard(){ if(!guarded){ window.addEventListener('beforeunload',beforeUnload); guarded=true; } }
function disarmUnloadGuard(){ window.removeEventListener('beforeunload',beforeUnload); guarded=false; }

/* ============================================================
   6) เริ่มทำงาน
   ============================================================ */
screenConsent();
</script>
